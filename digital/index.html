<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lantern Depth Drift</title>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060606;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: default;
    }
    .hint {
      position: fixed;
      left: 14px;
      bottom: 12px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      letter-spacing: 0.2px;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.45);
      background: rgba(12, 12, 12, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 7px 10px;
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body>
  <div class="hint">Left/Right arrows: pan view</div>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script src="./lanterns.js"></script>
</body>
</html>
